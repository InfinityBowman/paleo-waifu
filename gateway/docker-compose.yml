# Local dev docker-compose. For production, the homelab pulls from GHCR.
name: paleo-waifu-gateway

services:
  gateway:
    build: .
    container_name: paleo-waifu-gateway
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:?Set DISCORD_BOT_TOKEN in .env}
      - XP_API_URL=${XP_API_URL:?Set XP_API_URL in .env}
      - XP_API_SECRET=${XP_API_SECRET:?Set XP_API_SECRET in .env}
      - NODE_ENV=production
