name: Deploy Bot

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - 'src/lib/**'
      - 'drizzle/**'
      - '.github/workflows/deploy-bot.yml'

concurrency:
  group: deploy-bot
  cancel-in-progress: false

jobs:
  migrate:
    name: D1 Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply paleo-waifu-db-prod --remote --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # Root deps needed - bot imports shared code from src/lib/ (drizzle-orm, nanoid, etc.)
      - run: pnpm install --frozen-lockfile

      - name: Install bot dependencies
        run: pnpm install --frozen-lockfile
        working-directory: bot

      - name: Deploy bot
        run: npx wrangler deploy -c wrangler.jsonc --env production
        working-directory: bot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
