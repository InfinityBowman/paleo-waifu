name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'web/src/**'
      - 'web/public/**'
      - 'web/drizzle/**'
      - 'web/wrangler.jsonc'
      - 'web/vite.config.ts'
      - 'web/package.json'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-website.yml'

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  migrate:
    name: D1 Migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply paleo-waifu-db-prod --remote --env production
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: npx vite build
        working-directory: web
        env:
          CLOUDFLARE_ENV: production

      - name: Deploy
        run: npx wrangler deploy
        working-directory: web
        env:
          CLOUDFLARE_ENV: production
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
