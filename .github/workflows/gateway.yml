name: Gateway Docker

on:
  push:
    branches: [main]
    paths:
      - "gateway/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: infinitybowman/paleo-waifu-gateway

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  notify-homelab:
    name: Trigger Homelab Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMELAB_DEPLOY_TOKEN }}
          repository: ${{ github.repository_owner }}/home-lab
          event-type: deploy-paleo-gateway
